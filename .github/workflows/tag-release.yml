name: TagRelease

on:
  workflow_dispatch:
      inputs:
        release_tag:
          description: "Tag to publish draft release assets to (required for manual runs)"
          required: false
          type: string
        do_version_check:
          description: "Skip checking version mismatches between software and tag"
          required: false
          default: false
          type: boolean

  push:
    tags:
      - '*'
      - '!*norel*'

jobs:
  prep_release:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      MOD_NAME: "CupheadArchipelago"

    outputs:
      rel_tag: ${{ steps.vars.outputs.rel_tag }}
      mod_name: ${{ steps.vars.outputs.mod_name }}

    steps:
      - name: Set Vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.release_tag }}"
          fi
          if [[ -z "${TAG}" ]]; then
            echo "No release tag available. For workflow_dispatch, provide inputs.release_tag."
            exit 1
          fi
          echo "rel_tag=${TAG}" >> "${GITHUB_OUTPUT}"

          echo "mod_name=${{ env.MOD_NAME }}" >> $GITHUB_OUTPUT

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: false
          name: AP Mod ${{ steps.vars.outputs.rel_tag }}
          token: ${{ secrets.AP_TOKEN }}

  build_release:
    strategy:
      fail-fast: false
      matrix:
        os:
          - {name: win64, runner: ubuntu-latest, priv_branch: main}
          #- {name: macos, runner: macos-latest, priv_branch: main-macos}

    name: Build and Upload Release ${{ matrix.os.name }}
    runs-on: ${{ matrix.os.runner }}
    needs: prep_release

    env:
      RELEASE_VERSION: ${{ needs.prep_release.outputs.rel_tag }}
      MOD_NAME: ${{ needs.prep_release.outputs.mod_name }}

    steps:
      - name: Set Env
        run: |
          export FILE_NAME="${MOD_NAME}-${RELEASE_VERSION}_${{ matrix.os.name }}.zip"
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6
        #with:
        #  fetch-depth: 0  # Fetch all history for possible versioning

      - name: Clean project directory
        run: |
          rm -rf ref/

      - name: Checkout Private Reference Assemblies
        uses: actions/checkout@v6
        with:
          repository: JKLeckr/CupheadArchipelagoMod-Private
          token: ${{ secrets.AP_PRIVATE_TOKEN }}
          ref: ${{ matrix.os.priv_branch }}
          path: CupheadArchipelago/ref

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup Project
        run: |
          dotnet restore
          dotnet clean

      - name: Check version
        if: ${{ github.event.inputs.do_version_check == 'true' }}
        run: |
          export PARSED_VERSION="$(grep -oPm1 '(?<=<Version>)[^<]+' CupheadArchipelago/CupheadArchipelago.csproj)"
          dotnet run --project ./CupheadArchipelago.Helpers/CheckVersions/ "${PARSED_VERSION}" "${{ env.RELEASE_VERSION }}"

      - name: Build Project
        working-directory: ${{ env.MOD_NAME }}
        run: |
          mkdir ../build
          dotnet build --no-restore -o ../build/${{ env.MOD_NAME }}

      - name: Generate Manifest
        run: |
          dotnet run --no-restore --project ${{ env.MOD_NAME }}.Helpers/GenManifest ${{ env.MOD_NAME }} build/${{ env.MOD_NAME }}/manifest.json

      - name: Build ZIP package
        working-directory: build
        run: |
          cp -rv ../${{ env.MOD_NAME }}/ref/licenses ${{ env.MOD_NAME }}/
          zip -r ../${{ env.FILE_NAME }} ${{ env.MOD_NAME }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: false
          name: AP Mod ${{ env.RELEASE_VERSION }}
          token: ${{ secrets.AP_TOKEN }}
          files: |
            ${{ env.FILE_NAME }}
